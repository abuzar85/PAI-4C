<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI N-Queens Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #4f46e5;
            --dark: #0f172a;
            --light: #f8fafc;
            --accent: #22d3ee;
        }
    </style>
</head>

<body class="bg-gray-900 text-white font-['Roboto'] overflow-hidden h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-slate-800 border-b border-slate-700 px-6 py-4 flex justify-between items-center shadow-lg z-50">
        <div class="flex items-center space-x-3">
            <div class="p-2 bg-indigo-600 rounded-lg">
                <span class="text-2xl">♛</span>
            </div>
            <h1
                class="text-2xl font-bold font-['Orbitron'] tracking-wider bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">
                N-QUEENS SEARCH VISUALIZER
            </h1>
        </div>
        <div class="flex items-center space-x-6">
            <div class="flex items-center space-x-2">
                <label for="boardSize" class="text-sm font-medium text-slate-400 uppercase tracking-tighter">Board Size
                    (N):</label>
                <input type="number" id="boardSize" value="4" min="4" max="12"
                    class="bg-slate-900 border border-slate-600 rounded-md px-3 py-1 w-16 text-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <button id="solveBtn"
                class="bg-indigo-600 hover:bg-indigo-500 px-6 py-2 rounded-lg font-bold transition-all transform hover:scale-105 shadow-indigo-500/20 shadow-lg">
                SOLVE
            </button>
            <button id="resetBtn"
                class="bg-slate-700 hover:bg-slate-600 px-6 py-2 rounded-lg font-bold transition-all shadow-lg">
                RESET
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex overflow-hidden">
        <!-- Left Panel: Chessboard -->
        <div class="w-1/2 p-6 flex flex-col border-r border-slate-800 bg-slate-900/50">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-['Orbitron'] text-indigo-400">Interactive Chessboard</h2>
                <div id="statusIndicator"
                    class="px-3 py-1 bg-slate-800 rounded-full text-xs font-mono text-slate-400 border border-slate-700">
                    IDLE
                </div>
            </div>
            <div id="boardContainer"
                class="flex-1 flex items-center justify-center bg-slate-800/30 rounded-xl border border-dashed border-slate-700 relative overflow-hidden">
                <div id="chessboard" class="grid aspect-square shadow-2xl relative"></div>
            </div>
            <div id="stepExplanation"
                class="mt-4 p-4 bg-slate-800 border-l-4 border-indigo-500 rounded-r-lg min-h-[80px]">
                <p class="text-slate-400 italic">Initialize your N-Queens solver by selecting board size and clicking
                    "Solve".</p>
            </div>
        </div>

        <!-- Right Panel: Tree Visualization -->
        <div class="w-1/2 p-6 flex flex-col bg-slate-900">
            <h2 class="text-lg font-['Orbitron'] text-indigo-400 mb-4">State-Space Search Tree</h2>
            <div id="treeContainer"
                class="flex-1 bg-slate-950 rounded-xl border border-slate-800 relative overflow-hidden cursor-move">
                <svg id="treeSvg" class="w-full h-full"></svg>
            </div>
            <!-- Statistics -->
            <div class="grid grid-cols-4 gap-4 mt-4">
                <div class="bg-slate-800 p-3 rounded-lg border border-slate-700">
                    <p class="text-xs text-slate-500 uppercase">Visited States</p>
                    <p id="visitedCount" class="text-xl font-bold text-indigo-400">0</p>
                </div>
                <div class="bg-slate-800 p-3 rounded-lg border border-slate-700">
                    <p class="text-xs text-slate-500 uppercase">Backtracks</p>
                    <p id="backtrackCount" class="text-xl font-bold text-red-400">0</p>
                </div>
                <div class="bg-slate-800 p-3 rounded-lg border border-slate-700">
                    <p class="text-xs text-slate-500 uppercase">Solutions</p>
                    <p id="solutionCount" class="text-xl font-bold text-emerald-400">0</p>
                </div>
                <div class="bg-slate-800 p-3 rounded-lg border border-slate-700">
                    <p class="text-xs text-slate-500 uppercase">Runtime (ms)</p>
                    <p id="runtimeDisplay" class="text-xl font-bold text-amber-400">0</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer: Controls -->
    <footer class="bg-slate-800 border-t border-slate-700 p-4 space-y-4">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <!-- Playback Controls -->
            <div class="flex items-center space-x-4">
                <button id="prevBtn"
                    class="p-2 hover:bg-slate-700 rounded-full text-slate-400 transition-colors disabled:opacity-30"
                    disabled>
                    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20">
                        <path
                            d="M8.445 14.832A1 1 0 0010 14V6a1 1 0 00-1.555-.832l-6 4a1 1 0 000 1.664l6 4zM16 14.832A1 1 0 0017.555 14V6a1 1 0 00-1.555-.832l-6 4a1 1 0 000 1.664l6 4z">
                        </path>
                    </svg>
                </button>
                <button id="playPauseBtn"
                    class="p-4 bg-indigo-600 hover:bg-indigo-500 rounded-full shadow-lg shadow-indigo-500/20 transition-all transform hover:scale-110 disabled:opacity-30"
                    disabled>
                    <svg id="playIcon" class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20">
                        <path
                            d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.333-5.89a1.5 1.5 0 000-2.538L6.3 2.841z">
                        </path>
                    </svg>
                    <svg id="pauseIcon" class="w-8 h-8 hidden" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M5 4h3v12H5V4zm7 0h3v12h-3V4z"></path>
                    </svg>
                </button>
                <button id="nextBtn"
                    class="p-2 hover:bg-slate-700 rounded-full text-slate-400 transition-colors disabled:opacity-30"
                    disabled>
                    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20">
                        <path
                            d="M4.555 5.168A1 1 0 003 6v8a1 1 0 001.555.832l6-4a1 1 0 000-1.664l-6-4zM11.555 5.168A1 1 0 0010 6v8a1 1 0 001.555.832l6-4a1 1 0 000-1.664l-6-4z">
                        </path>
                    </svg>
                </button>
            </div>

            <!-- Speed Control -->
            <div class="flex items-center space-x-4 flex-1 max-w-sm px-8">
                <span class="text-xs text-slate-400 font-mono">SLOW</span>
                <input type="range" id="speedSlider" min="50" max="1000" value="500" step="50"
                    class="w-full accent-indigo-500 h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                <span class="text-xs text-slate-400 font-mono">FAST</span>
            </div>

            <!-- Solutions Navigation -->
            <div id="solutionsNav"
                class="hidden flex items-center space-x-4 bg-slate-900/50 p-2 rounded-lg border border-slate-700">
                <span class="text-xs text-emerald-400 font-bold">SOLUTIONS:</span>
                <select id="solutionSelect"
                    class="bg-slate-800 text-slate-300 text-sm rounded border border-slate-700 px-2 py-1 outline-none">
                </select>
                <button id="downloadReportBtn"
                    class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs px-3 py-1.5 rounded transition-colors font-bold flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                        </path>
                    </svg>
                    PDF REPORT
                </button>
            </div>
        </div>
    </footer>

    <!-- Overlay Loader -->
    <div id="loader" class="fixed inset-0 bg-slate-950/80 flex items-center justify-center z-50 hidden">
        <div class="flex flex-col items-center">
            <div class="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-indigo-400 font-bold tracking-widest animate-pulse">SOLVING PROBLEM...</p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="graph.js"></script>
    <script src="main.js"></script>
</body>

</html>
